
map $http_user_agent $loggable {
    default 1;
    "~ELB-HealthChecker" 0;
}

# WS 핸드셰이크(/ws?token=<JWT>)의 token 값을 access 로그에서 가린다.
# 토큰은 그대로 백엔드로 전달되어 기능에는 영향이 없고, 로그에만 *** 로 기록된다.
map $request $masked_request {
    ~^(.*[?&](?:token|ticket|code|state)=)[^&\s]+(.*)$  "$1***$2";
    default                       $request;
}

# combined 와 동일하되 $request 를 마스킹된 버전으로 대체한 로그 포맷.
log_format masked '$remote_addr - $remote_user [$time_local] '
                  '"$masked_request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent"';

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log masked if=$loggable;

    root /usr/share/nginx/html;
    index index.html;

    # 보안 응답 헤더 (ALB 가 TLS 종료 후 평문으로 넘기지만 HSTS 는 브라우저의 https 접속에 적용된다)
    #   X-Frame-Options        : iframe 삽입 차단(클릭재킹 방어)
    #   X-Content-Type-Options : MIME 스니핑 차단
    #   Referrer-Policy        : 외부로 전체 URL referrer 누출 제한
    #   Strict-Transport-Security: 이후 접속을 https 로 강제 (서브도메인 https 보장 전까지 includeSubDomains 제외)
    # 주의: add_header 가 있는 하위 location(정적 캐시 등)은 이 헤더를 상속하지 않아 개별 반복이 필요하다.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # React Router - 새로고침 시 404 방지
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 백엔드 API 프록시 (포트 9000)
    location /api/ {
        proxy_pass http://moida-backend:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket 프록시
    # location 패턴은 슬래시 없이 두어 `/ws`(STOMP 엔드포인트 본체)와
    # 후속 프레임 경로 모두를 prefix match로 잡는다.
    location /ws {
        proxy_pass http://moida-backend:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 채팅 idle 상황에서 nginx 기본 60초 타임아웃에 끊기지 않도록 연장
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Passwordless push connector WebSocket 프록시
    # 브라우저 wss://moida.site/pwless-ws → (ALB TLS 종료) → 여기서 평문 ws 로 DualAuth push connector(15010)에 전달.
    # 끝 슬래시(proxy_pass .../)로 /pwless-ws prefix 를 떼고 커넥터 루트(/)로 보낸다.
    location /pwless-ws/ {
        proxy_pass http://43.200.63.15:15010/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 인증 대기 동안 idle 연결이 끊기지 않도록 연장
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 정적 파일 캐시
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # 이 location 은 자체 add_header 가 있어 server 의 보안 헤더를 상속하지 않으므로 nosniff 를 다시 명시.
        add_header X-Content-Type-Options "nosniff" always;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
